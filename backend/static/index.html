<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KLYRA AI - Voice Assistant</title>
    <meta name="description" content="KLYRA AI - Next-generation voice assistant for seamless interaction and high-performance system orchestration." />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- Background Grid -->
    <div class="grid-overlay"></div>

    <!-- Aurora Blobs -->
    <div class="aurora">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
    </div>

    <!-- Decorative Corners -->
    <div class="corner-decor top-left"></div>
    <div class="corner-decor bottom-right"></div>

    <!-- Nav -->
    <nav id="main-nav">
        <div class="nav-brand">KLYRA <span class="nav-version">VERSION 3.0</span></div>
        <div class="nav-links">
            <a href="#">Documentation</a>
            <a href="#">Features</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <main id="hero">
        <!-- Left: AI Character -->
        <div class="hero-character" id="hero-right">
            <div class="character-container">
                <div class="character-glow" id="character-glow"></div>
                <img src="/static/klyra_character.png" alt="KLYRA AI" class="character-img" id="character-img" />
            </div>
        </div>

        <!-- Right: Heading & Content -->
        <div class="hero-text-content" id="hero-left">
            <div class="hero-text">
                <h1>THE FUTURE OF <br/> <span class="cyan-text">INTELLIGENCE</span></h1>
                <p class="hero-description">
                    Experience KLYRA, the next-generation AI assistant designed for seamless voice interaction and high-performance system orchestration.
                </p>
            </div>

            <div class="hero-buttons" id="hero-buttons">
                <button id="btn-start" class="btn-primary" onclick="initAssistant()">
                    <div class="btn-shine"></div>
                    <span class="btn-content">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Start Talking
                    </span>
                </button>
                <button id="btn-hold" class="btn-hold hidden" onclick="startRecording()">
                    Tap to Listen Manually
                </button>
            </div>

            <div class="status-bar">
                <span class="status-indicator">
                    <div class="status-dot-small" id="status-dot-small"></div>
                    STATUS: <span id="status-text">Idle</span>
                </span>
                <span class="status-divider"></span>
                <span>MODEL: GEMINI-2.0-FLASH</span>
            </div>
        </div>
    </main>

    <!-- Floating Chat Button -->
    <button id="chat-fab" class="chat-fab" onclick="toggleChat(true)">
        <img src="/static/klyra_avatar.png" alt="K" class="fab-avatar" />
        <div class="fab-overlay">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
    </button>

    <!-- Chat Panel -->
    <div id="chat-panel" class="chat-panel hidden">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <img src="/static/klyra_avatar.png" class="chat-avatar" alt="KLYRA" />
                <div class="chat-header-title">KLYRA INTERFACE</div>
            </div>
            <button class="chat-close-btn" onclick="toggleChat(false)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- Chat Messages -->
        <div id="chat-messages" class="chat-messages">
            <div class="msg-wrapper msg-bot">
                <div class="msg-sender">Ruby</div>
                <div class="msg bot">KLYRA AI Core Initialized.</div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-zone">
            <div class="chat-input-row">
                <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off" />
                <button id="btn-send" class="btn-send" onclick="handleSendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div class="chat-controls">
                <div class="control-left">
                    <input type="checkbox" id="cont-toggle" checked />
                    <label for="cont-toggle">Live Activation</label>
                </div>
                <div class="control-right">
                    <span>Voice:</span>
                    <select id="gender-select" onchange="handleGenderChange(this.value)">
                        <option value="Boy">Boy</option>
                        <option value="Girl">Girl</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.IO CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
